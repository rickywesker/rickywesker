<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 60" shape-rendering="crispEdges">
  <rect width="840" height="60" fill="#1a1a2e"/>

  <!-- pixel ground repeating -->
  <rect x="0" y="0" width="840" height="8" fill="#533483"/>

  <!-- small pixel mushrooms and flowers -->
  <rect x="100" y="16" width="4" height="8" fill="#27ae60"/>
  <rect x="96" y="12" width="12" height="4" fill="#e94560"/>
  <rect x="96" y="8" width="12" height="4" fill="#e94560"/>
  <rect x="100" y="8" width="4" height="4" fill="#ffd700"/>

  <rect x="400" y="16" width="4" height="8" fill="#27ae60"/>
  <rect x="394" y="12" width="6" height="4" fill="#ffd700"/>
  <rect x="404" y="12" width="6" height="4" fill="#ffd700"/>
  <rect x="398" y="8" width="8" height="4" fill="#ffd700"/>

  <rect x="700" y="16" width="4" height="8" fill="#27ae60"/>
  <rect x="696" y="12" width="12" height="4" fill="#e94560"/>
  <rect x="696" y="8" width="12" height="4" fill="#e94560"/>
  <rect x="700" y="8" width="4" height="4" fill="#ffd700"/>

  <!-- ground dots -->
  <rect x="200" y="22" width="4" height="4" fill="#533483" opacity="0.4"/>
  <rect x="300" y="28" width="4" height="4" fill="#533483" opacity="0.3"/>
  <rect x="550" y="20" width="4" height="4" fill="#533483" opacity="0.4"/>
  <rect x="780" y="26" width="4" height="4" fill="#533483" opacity="0.3"/>

  <text x="420" y="48" font-family="'Courier New', monospace" font-size="10" fill="#e0e0e0" opacity="0.3" text-anchor="middle">GAME OVER? NEVER.</text>
</svg>
